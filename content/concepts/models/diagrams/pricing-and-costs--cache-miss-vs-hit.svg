<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="544" viewBox="0 0 1120 544" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid)
Canvas 1120x544. Title center (560,44). Subtitle text center (560,68).

Container TOP "First time this prefix is seen — cache miss + cache write":
  x=32 y=88 w=992 h=140 (88..228), caption (48,110)
  Row y=124 h=64 (124..188) c_y=156
    N1 Input (indigo)  x=64  w=280 (64..344)  c=(204,156)
    N2 Output (orange) x=408 w=200 (408..608) c=(508,156)
    N3 Cost (neutral)  x=672 w=320 (672..992) c=(832,156)

Container BOTTOM "Repeat request, same prefix, within the cache TTL — cache hit":
  x=32 y=268 w=992 h=140 (268..408), caption (48,290)
  Row y=304 h=64 (304..368) c_y=336
    M1 Input (green)   x=64  w=280 (64..344)  c=(204,336)
    M2 Output (orange) x=408 w=200 (408..608) c=(508,336)
    M3 Cost (neutral)  x=672 w=320 (672..992) c=(832,336)

Batch note (yellow), spans under both containers, centered on content region [32..1024], center x=528:
  x=178 y=448 w=700 h=64 (448..512) c=(528,480)

Arrows (#475569, one L-bend max; these are pure horizontal, no bend needed):
  N1->N2 (344,156)->(406,156)
  N2->N3 (608,156)->(670,156)
  M1->M2 (344,336)->(406,336)
  M2->M3 (608,336)->(670,336)
-->
  <rect width="1120" height="544" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="560" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">One prompt, two prices: cache miss vs. cache hit</text>
  <text x="560" y="68" font-size="12" fill="#64748B" text-anchor="middle">Sticker price for this model: $3.00 in / $15.00 out per 1M tokens — same headline number on both rows below</text>

  <!-- container top -->
  <rect x="32" y="88" width="992" height="140" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="110" font-size="12" fill="#64748B">First time this prefix is seen — cache miss + cache write</text>

  <line x1="344" y1="156" x2="406" y2="156" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="608" y1="156" x2="670" y2="156" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="64" y="124" width="280" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="204" y="149" font-size="13" fill="#1E1B4B" text-anchor="middle">2,000 @ write + 100 fresh<tspan x="204" dy="17">$3.75/M + $3.00/M</tspan></text>

  <rect x="408" y="124" width="200" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="508" y="149" font-size="14" fill="#7C2D12" text-anchor="middle">Output: 400 tok<tspan x="508" dy="17">$15.00 /M</tspan></text>

  <rect x="672" y="124" width="320" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="832" y="149" font-size="13" fill="#334155" text-anchor="middle">$0.0075 + $0.0003 + $0.0060<tspan x="832" dy="17">= $0.0138 / request</tspan></text>

  <!-- container bottom -->
  <rect x="32" y="268" width="992" height="140" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="290" font-size="12" fill="#64748B">Repeat request, same prefix, within the cache TTL — cache hit</text>

  <line x1="344" y1="336" x2="406" y2="336" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="608" y1="336" x2="670" y2="336" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="64" y="304" width="280" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="204" y="329" font-size="13" fill="#064E3B" text-anchor="middle">2,000 cached + 100 fresh<tspan x="204" dy="17">$0.30/M + $3.00/M</tspan></text>

  <rect x="408" y="304" width="200" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="508" y="329" font-size="14" fill="#7C2D12" text-anchor="middle">Output: 400 tok<tspan x="508" dy="17">$15.00 /M</tspan></text>

  <rect x="672" y="304" width="320" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="832" y="329" font-size="13" fill="#334155" text-anchor="middle">$0.0006 + $0.0003 + $0.0060<tspan x="832" dy="17">= $0.0069 / request</tspan></text>

  <!-- batch note -->
  <rect x="178" y="448" width="700" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="528" y="473" font-size="13" fill="#713F12" text-anchor="middle">Batch API: −50% on every rate above (stacks with caching)<tspan x="528" dy="17">Only worth it when minutes–hours turnaround is fine</tspan></text>
</svg>
