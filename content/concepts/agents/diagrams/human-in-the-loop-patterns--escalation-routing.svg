<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid), canvas 920x600
Title center (460,32)
Trunk column x=360-560 (center 460):
  A Agent proposes action (violet)      x=360 y=88  w=200 h=64  center(460,120)
  B On high-risk list? (guardrail red)  x=360 y=224 w=200 h=72  center(460,260)
  C Confidence >= threshold? (neutral)  x=360 y=368 w=200 h=72  center(460,404)
  D Execute autonomously (indigo)       x=360 y=512 w=200 h=64  center(460,544)
Branch (right side):
  E Human review, compact summary (orange) x=680 y=296 w=200 h=72 center(780,332)
Arrows:
  A->B straight (460,152-222)
  B->C straight (460,296-368) label "no"
  C->D straight (460,440-510) label "confident: proceed"
  B->E: vertical (560,260-332 no marker) + C->E vertical (560,404-332 no marker)
        share one horizontal (560,332-678, marker) into E left edge
  E->D: vertical (780,368-544 no marker) + horizontal (780-562,544 marker) into D right edge
  E->A: vertical (780,296-120 no marker) + horizontal (780-562,120 marker) into A right edge
-->
  <rect width="920" height="600" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="460" y="32" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Escalation routing: hard gates first, confidence second</text>

  <!-- A: Agent proposes action -->
  <rect x="360" y="88" width="200" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="460" y="124" font-size="14" fill="#2E1065" text-anchor="middle">Agent proposes action</text>

  <!-- B: hard-coded gate -->
  <rect x="360" y="224" width="200" height="72" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="460" y="255" font-size="14" fill="#7F1D1D" text-anchor="middle">On high-risk</text>
  <text x="460" y="274" font-size="14" fill="#7F1D1D" text-anchor="middle">action list?</text>

  <!-- C: confidence check -->
  <rect x="360" y="368" width="200" height="72" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="460" y="399" font-size="14" fill="#334155" text-anchor="middle">Confidence &#8805;</text>
  <text x="460" y="418" font-size="14" fill="#334155" text-anchor="middle">threshold?</text>

  <!-- D: execute autonomously -->
  <rect x="360" y="512" width="200" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="460" y="540" font-size="14" fill="#1E1B4B" text-anchor="middle">Execute</text>
  <text x="460" y="557" font-size="12" fill="#1E1B4B" text-anchor="middle">autonomously</text>

  <!-- E: human review -->
  <rect x="680" y="296" width="200" height="72" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="780" y="327" font-size="14" fill="#7C2D12" text-anchor="middle">Human review</text>
  <text x="780" y="346" font-size="12" fill="#7C2D12" text-anchor="middle">(compact summary)</text>

  <!-- A -> B -->
  <line x1="460" y1="152" x2="460" y2="222" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B -> C -->
  <line x1="460" y1="296" x2="460" y2="366" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="424" y="323" width="72" height="18" fill="#ffffff"/>
  <text x="460" y="336" font-size="12" fill="#475569" text-anchor="middle">no</text>

  <!-- C -> D -->
  <line x1="460" y1="440" x2="460" y2="510" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="392" y="466" width="136" height="18" fill="#ffffff"/>
  <text x="460" y="479" font-size="12" fill="#475569" text-anchor="middle">confident: proceed</text>

  <!-- B -> E and C -> E, merged into E's left edge -->
  <line x1="560" y1="260" x2="560" y2="332" stroke="#475569" stroke-width="1.5"/>
  <line x1="560" y1="404" x2="560" y2="332" stroke="#475569" stroke-width="1.5"/>
  <line x1="560" y1="332" x2="678" y2="332" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="566" y="279" width="90" height="18" fill="#ffffff"/>
  <text x="611" y="292" font-size="12" fill="#475569" text-anchor="middle">yes: high-risk</text>
  <rect x="566" y="359" width="100" height="18" fill="#ffffff"/>
  <text x="616" y="372" font-size="12" fill="#475569" text-anchor="middle">low confidence</text>

  <!-- E -> D (approve / edit) -->
  <line x1="780" y1="368" x2="780" y2="544" stroke="#475569" stroke-width="1.5"/>
  <line x1="780" y1="544" x2="562" y2="544" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="626" y="535" width="110" height="18" fill="#ffffff"/>
  <text x="681" y="548" font-size="12" fill="#475569" text-anchor="middle">approve / edit</text>

  <!-- E -> A (reject: re-plan) -->
  <line x1="780" y1="296" x2="780" y2="120" stroke="#475569" stroke-width="1.5"/>
  <line x1="780" y1="120" x2="562" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="616" y="111" width="120" height="18" fill="#ffffff"/>
  <text x="676" y="124" font-size="12" fill="#475569" text-anchor="middle">reject: re-plan</text>
</svg>
