<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="816" viewBox="0 0 1040 816" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid), canvas 1040x816
Title center (520,32)
Trunk (center x=460):
  T1 Tool call fails (red)          x=360 y=88  w=200 h=64 center(460,120)
  T2 Transient failure? (neutral)   x=360 y=216 w=200 h=72 center(460,252)
  T3 Self-correction: revise (violet) x=360 y=344 w=200 h=64 center(460,376)
  T4 Validate recovery (neutral)    x=360 y=472 w=200 h=72 center(460,508)
  T5 Resume task (indigo)           x=360 y=600 w=200 h=64 center(460,632)
Left branch (from T2 "yes"): S1 Retry with backoff (yellow) x=140 y=344 w=200 h=64 center(240,376)
Right branch (from T4 "invalid"), SAME ROW as T4 so the link is a plain straight
  arrow and never runs alongside Resume task below it:
  S2 Rollback to checkpoint (green) x=680 y=472 w=200 h=72 center(780,508)
Bottom row: Circuit breaker (red) x=360 y=720 w=200 h=64 center(460,752)
            Escalate/fallback (orange) x=680 y=720 w=200 h=64 center(780,752)
Arrows (each <=1 bend; merges use shared bus lines):
  T1->T2 straight. T2->S1: 1 bend via (358,252)->(240,252)->(240,342).
  T2->T3 straight, label "no: logic error". T3->T4 straight.
  T4->T5 straight, label "valid: continue".
  T4->S2: straight horizontal (560,508)->(678,508), label "invalid: roll back".
  S1->bus(y=704)->breaker: (240,408) down to (240,704) [0 bend] then (240,704)->(460,704) [1 bend] then shared (460,704)->(460,718) into breaker top.
  S2->bus(y=704)->breaker: (780,544) down to (780,704) [0 bend] then (780,704)->(460,704) [1 bend], shares same final segment into breaker top.
  Breaker->Escalate: straight horizontal.
-->
  <rect width="1040" height="816" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="520" y="32" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Classify the failure first: retry, self-correct, or trip the breaker</text>

  <!-- T1 -->
  <rect x="360" y="88" width="200" height="64" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="460" y="124" font-size="14" fill="#7F1D1D" text-anchor="middle">Tool call fails</text>

  <!-- T2 -->
  <rect x="360" y="216" width="200" height="72" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="460" y="247" font-size="14" fill="#334155" text-anchor="middle">Transient</text>
  <text x="460" y="266" font-size="14" fill="#334155" text-anchor="middle">failure?</text>

  <!-- S1 -->
  <rect x="140" y="344" width="200" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="240" y="371" font-size="14" fill="#713F12" text-anchor="middle">Retry with</text>
  <text x="240" y="390" font-size="12" fill="#713F12" text-anchor="middle">backoff (1s, 2s, 4s)</text>

  <!-- T3 -->
  <rect x="360" y="344" width="200" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="460" y="371" font-size="14" fill="#2E1065" text-anchor="middle">Self-correction:</text>
  <text x="460" y="390" font-size="12" fill="#2E1065" text-anchor="middle">revise the plan</text>

  <!-- T4 -->
  <rect x="360" y="472" width="200" height="72" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="460" y="503" font-size="14" fill="#334155" text-anchor="middle">Validate</text>
  <text x="460" y="522" font-size="14" fill="#334155" text-anchor="middle">recovery</text>

  <!-- T5 -->
  <rect x="360" y="600" width="200" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="460" y="636" font-size="14" fill="#1E1B4B" text-anchor="middle">Resume task</text>

  <!-- S2 -->
  <rect x="680" y="472" width="200" height="72" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="780" y="503" font-size="14" fill="#064E3B" text-anchor="middle">Rollback to</text>
  <text x="780" y="522" font-size="12" fill="#064E3B" text-anchor="middle">last checkpoint</text>

  <!-- Circuit breaker -->
  <rect x="360" y="720" width="200" height="64" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="460" y="747" font-size="14" fill="#7F1D1D" text-anchor="middle">Circuit breaker</text>
  <text x="460" y="766" font-size="12" fill="#7F1D1D" text-anchor="middle">(3x identical failure)</text>

  <!-- Escalate -->
  <rect x="680" y="720" width="200" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="780" y="747" font-size="14" fill="#7C2D12" text-anchor="middle">Escalate /</text>
  <text x="780" y="766" font-size="12" fill="#7C2D12" text-anchor="middle">fallback path</text>

  <!-- T1 -> T2 -->
  <line x1="460" y1="152" x2="460" y2="214" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- T2 -> S1 (transient: yes) -->
  <polyline points="358,252 240,252 240,342" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="176" y="288" width="110" height="18" fill="#ffffff"/>
  <text x="231" y="301" font-size="12" fill="#475569" text-anchor="middle">yes: transient</text>

  <!-- T2 -> T3 (logic error) -->
  <line x1="460" y1="288" x2="460" y2="342" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="392" y="306" width="136" height="18" fill="#ffffff"/>
  <text x="460" y="319" font-size="12" fill="#475569" text-anchor="middle">no: logic error</text>

  <!-- T3 -> T4 -->
  <line x1="460" y1="408" x2="460" y2="470" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- T4 -> T5 (valid) -->
  <line x1="460" y1="544" x2="460" y2="598" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="392" y="562" width="136" height="18" fill="#ffffff"/>
  <text x="460" y="575" font-size="12" fill="#475569" text-anchor="middle">valid: continue</text>

  <!-- T4 -> S2 (invalid), same row as T4 so it can never be mistaken for coming
       from Resume task in the row below -->
  <line x1="560" y1="508" x2="678" y2="508" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="566" y="482" width="106" height="18" fill="#ffffff"/>
  <text x="619" y="495" font-size="12" fill="#475569" text-anchor="middle">invalid: roll back</text>

  <!-- S1 -> bus -> breaker (exhausted retries) -->
  <line x1="240" y1="408" x2="240" y2="704" stroke="#475569" stroke-width="1.5"/>
  <line x1="240" y1="704" x2="460" y2="704" stroke="#475569" stroke-width="1.5"/>
  <rect x="176" y="683" width="150" height="18" fill="#ffffff"/>
  <text x="251" y="696" font-size="12" fill="#475569" text-anchor="middle">exhausted after 3 tries</text>

  <!-- S2 -> bus -> breaker (still failing after rollback) -->
  <line x1="780" y1="544" x2="780" y2="704" stroke="#475569" stroke-width="1.5"/>
  <line x1="780" y1="704" x2="460" y2="704" stroke="#475569" stroke-width="1.5"/>
  <rect x="560" y="683" width="130" height="18" fill="#ffffff"/>
  <text x="625" y="696" font-size="12" fill="#475569" text-anchor="middle">still failing</text>

  <!-- shared bus -> breaker top -->
  <line x1="460" y1="704" x2="460" y2="718" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Breaker -> Escalate -->
  <line x1="560" y1="752" x2="678" y2="752" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
