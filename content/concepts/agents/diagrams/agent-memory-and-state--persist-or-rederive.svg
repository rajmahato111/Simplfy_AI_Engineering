<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid), canvas 1200x480
Title center (600,32)
Container "Inside one step of the task loop": x=24 y=64 w=1152 h=368 (bottom=432)
Main row, center y=216:
  Context window (neutral)  x=64  y=184 w=192 h=64  center(160,216)
  Agent step (violet)       x=320 y=184 w=168 h=64  center(404,216)
  New fact (neutral)        x=552 y=192 w=136 h=48  center(620,216)
  Decision (neutral)        x=752 y=176 w=200 h=80  center(852,216)
  Live source (indigo)      x=992 y=96  w=152 h=64  center(1068,128)  [branch: cheap -> discard]
Checkpoint store (green), below Context window, same x range:
  x=64 y=344 w=192 h=64  center(160,376)             [branch: expensive -> persist]
Arrows:
  Context->Agent->NewFact->Decision: straight, 0-bend, y=216
  Decision->Live source: exit right-edge mid (952,216) up to y=128, right into (990,128) — 1 bend
  Decision->Checkpoint: exit bottom mid (852,256) down to y=376, left into (256,376) — 1 bend
  Evict: Context bottom (110,248) straight down to Checkpoint top (110,344) — 0 bend
  Fetch: Checkpoint top (210,344) straight up to Context bottom (210,248) — 0 bend
-->
  <rect width="1200" height="480" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="600" y="32" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Every step: keep it live, persist it once, or let it go</text>

  <rect x="24" y="64" width="1152" height="368" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="40" y="86" font-size="12" fill="#64748B">Inside one step of the task loop</text>

  <!-- Context window -->
  <rect x="64" y="184" width="192" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="160" y="211" font-size="14" fill="#334155" text-anchor="middle">Context window</text>
  <text x="160" y="228" font-size="12" fill="#334155" text-anchor="middle">(working memory)</text>

  <!-- Agent step -->
  <rect x="320" y="184" width="168" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="404" y="220" font-size="14" fill="#2E1065" text-anchor="middle">Agent step N</text>

  <!-- New fact -->
  <rect x="552" y="192" width="136" height="48" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="620" y="220" font-size="14" fill="#334155" text-anchor="middle">New fact</text>

  <!-- Decision -->
  <rect x="752" y="176" width="200" height="80" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="852" y="211" font-size="14" fill="#334155" text-anchor="middle">Cheap to</text>
  <text x="852" y="230" font-size="14" fill="#334155" text-anchor="middle">re-derive later?</text>

  <!-- Live source -->
  <rect x="992" y="96" width="152" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="1068" y="122" font-size="14" fill="#1E1B4B" text-anchor="middle">Live source</text>
  <text x="1068" y="139" font-size="12" fill="#1E1B4B" text-anchor="middle">(fetch next time)</text>

  <!-- Checkpoint store -->
  <rect x="64" y="344" width="192" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="371" font-size="14" fill="#064E3B" text-anchor="middle">Checkpoint store</text>
  <text x="160" y="388" font-size="12" fill="#064E3B" text-anchor="middle">(durable, keyed)</text>

  <!-- main chain arrows -->
  <line x1="256" y1="216" x2="318" y2="216" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="488" y1="216" x2="550" y2="216" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="688" y1="216" x2="750" y2="216" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- decision -> live source (1 bend) -->
  <polyline points="952,216 952,128 990,128" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="900" y="156" width="96" height="18" fill="#ffffff"/>
  <text x="948" y="169" font-size="12" fill="#475569" text-anchor="middle">cheap: discard</text>

  <!-- decision -> checkpoint (1 bend) -->
  <polyline points="852,256 852,376 258,376" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="560" y="333" width="140" height="18" fill="#ffffff"/>
  <text x="630" y="346" font-size="12" fill="#475569" text-anchor="middle">expensive: persist once</text>

  <!-- evict: context -> checkpoint (straight) -->
  <line x1="110" y1="248" x2="110" y2="342" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="76" y="286" width="70" height="18" fill="#ffffff"/>
  <text x="111" y="299" font-size="12" fill="#475569" text-anchor="middle">evict</text>

  <!-- fetch: checkpoint -> context (straight, upward) -->
  <line x1="210" y1="344" x2="210" y2="250" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="176" y="286" width="70" height="18" fill="#ffffff"/>
  <text x="211" y="299" font-size="12" fill="#475569" text-anchor="middle">fetch</text>
</svg>
