<svg xmlns="http://www.w3.org/2000/svg" width="920" height="544" viewBox="0 0 920 544" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid)
Canvas 920x544. Title center (460,44).

Return lane at y=72 (between title and main row), carries the "continue" feedback arrow.

Main row (inner loop) y=112 h=64 (112..176) c_y=144
  Reason  (violet) x=96  w=144 (96..240)   c=(168,144)
  Act     (indigo) x=336 w=144 (336..480)  c=(408,144)
  Observe (indigo) x=576 w=144 (576..720)  c=(648,144)

Checks container: x=64 y=248 w=792 h=144 (64..856, 248..392)
  caption (80,270)
  Goal predicate  (red) x=88  w=200 (88..288)  c=(188,312)
  Stagnation check(red) x=352 w=200 (352..552) c=(452,312)
  Budget check    (red) x=616 w=200 (616..816) c=(716,312)

Outcomes row y=456 h=64 (456..520) c_y=488
  Success exit      (green)  x=88  w=200 (88..288)  c=(188,488)
  Escalate to human (orange) x=400 w=304 (400..704) c=(552,488)

Arrows (#475569, start at source edge, end 2px before target edge):
  M1 Reason->Act        (240,144)->(334,144)
  M2 Act->Observe        (480,144)->(574,144)
  F1 Observe->Checks     (648,176)->(648,246)                         straight
  F2 continue (feedback) (648,112)->(648,72)->(168,72)->(168,110)     [loop-back; label "continue"]
  O1 GoalPredicate->Success   (188,344)->(188,454)                    straight
  O2 Stagnation->Escalate     (452,344)->(452,454)                    straight
  O3 Budget->Escalate         (716,344)->(716,454)                    straight
-->
  <rect width="920" height="544" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="460" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Termination checks that run outside the agent</text>

  <!-- feedback loop (continue) -->
  <polyline points="648,112 648,72 168,72 168,110" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <rect x="298" y="63" width="220" height="18" fill="#ffffff"/>
  <text x="408" y="76" font-size="12" fill="#475569" text-anchor="middle">continue (nothing tripped)</text>

  <!-- main row arrows -->
  <line x1="240" y1="144" x2="334" y2="144" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="144" x2="574" y2="144" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="648" y1="176" x2="648" y2="246" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- checks container -->
  <rect x="64" y="248" width="792" height="144" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="80" y="270" font-size="12" fill="#64748B">Checks (run every cycle, in the harness)</text>

  <!-- outcome arrows -->
  <line x1="188" y1="344" x2="188" y2="454" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="452" y1="344" x2="452" y2="454" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="716" y1="344" x2="716" y2="454" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- main row nodes -->
  <rect x="96" y="112" width="144" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="168" y="140" font-size="14" fill="#2E1065" text-anchor="middle">Reason<tspan x="168" dy="17">(next action)</tspan></text>

  <rect x="336" y="112" width="144" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="408" y="140" font-size="14" fill="#1E1B4B" text-anchor="middle">Act<tspan x="408" dy="17">(tool call)</tspan></text>

  <rect x="576" y="112" width="144" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="648" y="140" font-size="14" fill="#1E1B4B" text-anchor="middle">Observe<tspan x="648" dy="17">(result)</tspan></text>

  <!-- check nodes -->
  <rect x="88" y="280" width="200" height="64" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="188" y="308" font-size="14" fill="#7F1D1D" text-anchor="middle">Goal predicate<tspan x="188" dy="17">(deterministic)</tspan></text>

  <rect x="352" y="280" width="200" height="64" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="452" y="308" font-size="14" fill="#7F1D1D" text-anchor="middle">Stagnation check<tspan x="452" dy="17">(repeats / plans)</tspan></text>

  <rect x="616" y="280" width="200" height="64" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="716" y="308" font-size="14" fill="#7F1D1D" text-anchor="middle">Budget check<tspan x="716" dy="17">(steps, time, $)</tspan></text>

  <!-- outcome nodes -->
  <rect x="88" y="456" width="200" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="188" y="493" font-size="14" fill="#064E3B" text-anchor="middle">Success exit</text>

  <rect x="400" y="456" width="304" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="552" y="484" font-size="14" fill="#7C2D12" text-anchor="middle">Escalate to human<tspan x="552" dy="17">(with exact state)</tspan></text>
</svg>
