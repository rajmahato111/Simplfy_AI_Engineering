<svg xmlns="http://www.w3.org/2000/svg" width="1128" height="544" viewBox="0 0 1128 544" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid)
Canvas 1128x544. Title center (564,44).

Model (violet)     x=64  y=268 w=160 h=64 -> 64..224,  268..332  c=(144,300)
MCP Client (indigo) x=376 y=268 w=176 h=64 -> 376..552, 268..332  c=(464,300)

Server A container (dashed): x=680 y=88  w=424 h=176 (680..1104, 88..264), caption (696,110) "MCP Server: CRM"
  Tool A1 (green) x=712 y=152 w=168 -> 712..880,  152..216 c=(796,184) "get_customer"
  Tool A2 (green) x=904 y=152 w=168 -> 904..1072, 152..216 c=(988,184) "list_orders"

Server B container (dashed): x=680 y=336 w=424 h=176 (680..1104, 336..512), caption (696,358) "MCP Server: Ticketing"
  Tool B1 (green) x=712 y=400 w=168 -> 712..880,  400..464 c=(796,432) "search_tickets"
  Tool B2 (green) x=904 y=400 w=168 -> 904..1072, 400..464 c=(988,432) "create_ticket"

Arrows (orthogonal, <=1 bend, end 2px before target edge):
  Model->Client (call)        line (224,290)->(374,290)               label "tool call" above
  Client->Model (observation) line (374,312)->(226,312)               label "observation" below
  Client->ServerA (discover)  polyline (440,268)->(440,176)->(678,176)  label "discover + call"
  ServerA->Client (schema)    polyline (680,200)->(488,200)->(488,266)  label "schema + result"
  Client->ServerB (discover)  polyline (440,332)->(440,424)->(678,424)  (unlabeled - same pattern as Server A)
  ServerB->Client (schema)    polyline (680,448)->(488,448)->(488,334)  (unlabeled - same pattern as Server A)

  Verified no overlaps: verticals at x=440 vs x=488 (distinct); horizontals at y=176 vs y=200 (top pair) and
  y=424 vs y=448 (bottom pair) are distinct; top pair (y 176-268) and bottom pair (y 332-448) occupy separate
  vertical bands and never meet the Model<->Client arrows (y=290/312, x=224-374, entirely to the left of x=440).
-->
  <rect width="1128" height="544" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="564" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">MCP: one client, many servers, each owning its own tools</text>

  <!-- Server A container -->
  <rect x="680" y="88" width="424" height="176" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="696" y="110" font-size="12" fill="#64748B">MCP Server: CRM</text>

  <!-- Server B container -->
  <rect x="680" y="336" width="424" height="176" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="696" y="358" font-size="12" fill="#64748B">MCP Server: Ticketing</text>

  <!-- arrows: model <-> client -->
  <line x1="224" y1="290" x2="374" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="374" y1="312" x2="226" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrows: client <-> server A -->
  <polyline points="440,268 440,176 678,176" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="680,200 488,200 488,266" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrows: client <-> server B -->
  <polyline points="440,332 440,424 678,424" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="680,448 488,448 488,334" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- labels -->
  <rect x="242" y="270" width="66" height="16" fill="#ffffff"/>
  <text x="275" y="282" font-size="12" fill="#475569" text-anchor="middle">tool call</text>

  <rect x="232" y="316" width="96" height="16" fill="#ffffff"/>
  <text x="280" y="328" font-size="12" fill="#475569" text-anchor="middle">observation</text>

  <rect x="494" y="158" width="120" height="16" fill="#ffffff"/>
  <text x="554" y="170" font-size="12" fill="#475569" text-anchor="middle">discover + call</text>

  <rect x="519" y="204" width="120" height="16" fill="#ffffff"/>
  <text x="579" y="216" font-size="12" fill="#475569" text-anchor="middle">schema + result</text>

  <!-- Model / Client nodes -->
  <rect x="64" y="268" width="160" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="144" y="305" font-size="14" fill="#2E1065" text-anchor="middle">Model</text>

  <rect x="376" y="268" width="176" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="464" y="297" font-size="14" fill="#1E1B4B" text-anchor="middle">MCP Client<tspan x="464" dy="17" font-size="12" fill="#334155">discovers &amp; routes calls</tspan></text>

  <!-- Server A tools -->
  <rect x="712" y="152" width="168" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="796" y="189" font-size="14" fill="#064E3B" text-anchor="middle">get_customer</text>

  <rect x="904" y="152" width="168" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="988" y="189" font-size="14" fill="#064E3B" text-anchor="middle">list_orders</text>

  <!-- Server B tools -->
  <rect x="712" y="400" width="168" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="796" y="437" font-size="14" fill="#064E3B" text-anchor="middle">search_tickets</text>

  <rect x="904" y="400" width="168" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="988" y="437" font-size="14" fill="#064E3B" text-anchor="middle">create_ticket</text>
</svg>
