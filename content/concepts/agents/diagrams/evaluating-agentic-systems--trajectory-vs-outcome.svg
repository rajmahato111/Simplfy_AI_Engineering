<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="632" viewBox="0 0 1200 632" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid)
Canvas 1200x632. Title center (600,44).

Container 1 "Single-turn evaluation (one artifact)": x=32 y=76 w=1136 h=140 (32..1168, 76..216)
  caption (48,98)
  Row1 y=112 h=64 (112..176) c_y=144
    Query   x=64  w=144 (64..208)  c=(136,144)
    Answer  x=272 w=144 (272..416) c=(344,144)
    Judge1  x=480 w=160 (480..640) c=(560,144)
    Score1  x=704 w=160 (704..864) c=(784,144)

Container 2 "Trajectory evaluation (the agent case)": x=32 y=248 w=1136 h=360 (32..1168, 248..608)
  caption (48,270)
  Row Steps y=288 h=64 (288..352) c_y=320
    Step 1      x=64  w=144 (64..208)  c=(136,320)
    Step 2      x=272 w=144 (272..416) c=(344,320)
    Step 3      x=480 w=144 (480..624) c=(552,320)
    Final state x=688 w=176 (688..864) c=(776,320)
  Row taps y=416 h=64 (416..480) c_y=448
    Process reward x=64  w=560 (64..624)  c=(344,448)  [spans under steps 1-3]
    Outcome reward x=688 w=176 (688..864) c=(776,448)  [under Final state]
  Row judge y=512 h=64 (512..576) c_y=544
    Trajectory judge x=460 w=200 (460..660) c=(560,544)
    Trajectory score x=724 w=176 (724..900) c=(812,544)

Arrows (#475569, start at source edge, end 2px before target edge, one L-bend max):
  R1a Query->Answer     (208,144)->(270,144)
  R1b Answer->Judge1    (416,144)->(478,144)
  R1c Judge1->Score1    (640,144)->(702,144)
  S1  Step1->Step2      (208,320)->(270,320)
  S2  Step2->Step3      (416,320)->(478,320)
  S3  Step3->FinalState (624,320)->(686,320)
  T1  Step1->ProcTap    (136,352)->(136,416)   straight
  T2  Step2->ProcTap    (344,352)->(344,416)   straight
  T3  Step3->ProcTap    (552,352)->(552,416)   straight
  T4  FinalState->OutTap(776,352)->(776,416)   straight
  J1  ProcTap->Judge2   (344,480)->(344,544)->(458,544)
  J2  OutTap->Judge2    (776,480)->(776,544)->(662,544)
  J3  Judge2->Score2    (660,544)->(722,544)
-->
  <rect width="1200" height="632" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="600" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Grading one answer vs. grading a trajectory</text>

  <!-- containers -->
  <rect x="32" y="76" width="1136" height="140" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="98" font-size="12" fill="#64748B">Single-turn evaluation (one artifact)</text>

  <rect x="32" y="248" width="1136" height="360" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="270" font-size="12" fill="#64748B">Trajectory evaluation (the agent case)</text>

  <!-- container 1 arrows -->
  <line x1="208" y1="144" x2="270" y2="144" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="416" y1="144" x2="478" y2="144" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="144" x2="702" y2="144" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- container 2 arrows -->
  <line x1="208" y1="320" x2="270" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="416" y1="320" x2="478" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="624" y1="320" x2="686" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="136" y1="352" x2="136" y2="414" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="344" y1="352" x2="344" y2="414" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="552" y1="352" x2="552" y2="414" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="776" y1="352" x2="776" y2="414" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="344,480 344,544 456,544" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="776,480 776,544 664,544" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="544" x2="722" y2="544" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row1 nodes -->
  <rect x="64" y="112" width="144" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="136" y="149" font-size="14" fill="#7C2D12" text-anchor="middle">Query</text>

  <rect x="272" y="112" width="144" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="344" y="149" font-size="14" fill="#7C2D12" text-anchor="middle">Answer</text>

  <rect x="480" y="112" width="160" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="560" y="140" font-size="14" fill="#2E1065" text-anchor="middle">Judge<tspan x="560" dy="17">(one artifact)</tspan></text>

  <rect x="704" y="112" width="160" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="784" y="149" font-size="14" fill="#334155" text-anchor="middle">Score</text>

  <!-- Steps row nodes -->
  <rect x="64" y="288" width="144" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="136" y="316" font-size="14" fill="#1E1B4B" text-anchor="middle">Step 1<tspan x="136" dy="17">(tool call)</tspan></text>

  <rect x="272" y="288" width="144" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="344" y="316" font-size="14" fill="#1E1B4B" text-anchor="middle">Step 2<tspan x="344" dy="17">(tool call)</tspan></text>

  <rect x="480" y="288" width="144" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="552" y="316" font-size="14" fill="#1E1B4B" text-anchor="middle">Step 3<tspan x="552" dy="17">(tool call)</tspan></text>

  <rect x="688" y="288" width="176" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="776" y="316" font-size="14" fill="#7C2D12" text-anchor="middle">Final state<tspan x="776" dy="17">(env / world)</tspan></text>

  <!-- Taps row nodes -->
  <rect x="64" y="416" width="560" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="344" y="444" font-size="14" fill="#713F12" text-anchor="middle">Process reward<tspan x="344" dy="17">(scored per step)</tspan></text>

  <rect x="688" y="416" width="176" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="776" y="444" font-size="14" fill="#713F12" text-anchor="middle">Outcome reward<tspan x="776" dy="17">(final only)</tspan></text>

  <!-- Judge row nodes -->
  <rect x="460" y="512" width="200" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="560" y="540" font-size="14" fill="#2E1065" text-anchor="middle">Trajectory<tspan x="560" dy="17">judge</tspan></text>

  <rect x="724" y="512" width="176" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="812" y="540" font-size="14" fill="#334155" text-anchor="middle">Trajectory<tspan x="812" dy="17">score</tspan></text>
</svg>
