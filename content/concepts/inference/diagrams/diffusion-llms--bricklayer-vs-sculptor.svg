<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN
Canvas 1200x320. Title (600,32).
Row A label (32,64) "AUTOREGRESSIVE, ONE TOKEN PER PASS (BRICKLAYER)"
Row A boxes y=76 h=64 bottom=140 center=108, width=176, gap=64:
  A1 x=32   A2 x=272  A3 x=512  A4 x=752  A5 x=992   (end 1168)
  arrows: (208,108)-(270,108); (448,108)-(510,108); (688,108)-(750,108); (928,108)-(990,108)

Row B label (152,168) "DIFFUSION, MANY POSITIONS PER PASS (SCULPTOR)"
Row B boxes y=180 h=64 bottom=244 center=212, width=176, gap=64:
  B1 x=152 (Start: fully masked)  B2 x=392 (Step 1)  B3 x=632 (Step 2)  B4 x=872 (Step 3)  (end 1048)
  arrows: (328,212)-(390,212); (568,212)-(630,212); (808,212)-(870,212)

Footer caption centered (600,288).
-->
  <rect width="1200" height="320" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="600" y="32" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Same five tokens, two orders of work: one commit per pass vs. many per pass</text>

  <!-- Row A: autoregressive / bricklayer -->
  <text x="32" y="64" font-size="12" fill="#64748B">AUTOREGRESSIVE — ONE TOKEN PER PASS (BRICKLAYER)</text>

  <rect x="32" y="76" width="176" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="120" y="102" font-size="14" fill="#334155" text-anchor="middle">Pass 1</text>
  <text x="120" y="120" font-size="12" fill="#334155" text-anchor="middle">●○○○○</text>

  <line x1="208" y1="108" x2="270" y2="108" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="272" y="76" width="176" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="360" y="102" font-size="14" fill="#334155" text-anchor="middle">Pass 2</text>
  <text x="360" y="120" font-size="12" fill="#334155" text-anchor="middle">●●○○○</text>

  <line x1="448" y1="108" x2="510" y2="108" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="512" y="76" width="176" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="600" y="102" font-size="14" fill="#334155" text-anchor="middle">Pass 3</text>
  <text x="600" y="120" font-size="12" fill="#334155" text-anchor="middle">●●●○○</text>

  <line x1="688" y1="108" x2="750" y2="108" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="752" y="76" width="176" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="840" y="102" font-size="14" fill="#334155" text-anchor="middle">Pass 4</text>
  <text x="840" y="120" font-size="12" fill="#334155" text-anchor="middle">●●●●○</text>

  <line x1="928" y1="108" x2="990" y2="108" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="992" y="76" width="176" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="1080" y="102" font-size="14" fill="#334155" text-anchor="middle">Pass 5</text>
  <text x="1080" y="120" font-size="12" fill="#334155" text-anchor="middle">●●●●●</text>

  <!-- Row B: diffusion / sculptor -->
  <text x="152" y="168" font-size="12" fill="#64748B">DIFFUSION — MANY POSITIONS PER PASS (SCULPTOR)</text>

  <rect x="152" y="180" width="176" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="240" y="206" font-size="14" fill="#2E1065" text-anchor="middle">Start</text>
  <text x="240" y="224" font-size="12" fill="#2E1065" text-anchor="middle">fully masked ○○○○○</text>

  <line x1="328" y1="212" x2="390" y2="212" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="392" y="180" width="176" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="480" y="206" font-size="14" fill="#2E1065" text-anchor="middle">Step 1</text>
  <text x="480" y="224" font-size="12" fill="#2E1065" text-anchor="middle">●●○○○</text>

  <line x1="568" y1="212" x2="630" y2="212" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="632" y="180" width="176" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="720" y="206" font-size="14" fill="#2E1065" text-anchor="middle">Step 2</text>
  <text x="720" y="224" font-size="12" fill="#2E1065" text-anchor="middle">●●●●○</text>

  <line x1="808" y1="212" x2="870" y2="212" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="872" y="180" width="176" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="960" y="206" font-size="14" fill="#2E1065" text-anchor="middle">Step 3</text>
  <text x="960" y="224" font-size="12" fill="#2E1065" text-anchor="middle">●●●●● resolved</text>

  <text x="600" y="288" font-size="12" fill="#64748B" text-anchor="middle">Five sequential passes vs. three parallel-refinement passes — same five tokens either way</text>
</svg>
