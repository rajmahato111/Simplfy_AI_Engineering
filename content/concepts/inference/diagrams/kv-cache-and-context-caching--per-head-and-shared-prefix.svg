<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="496" viewBox="0 0 1200 496" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN
Canvas 1200x496. Title (600,32).
Row A label (24,76) "PER-TOKEN CACHE SIZE, BY ATTENTION LAYOUT"
Row A boxes y=88 h=64 bottom=152 center=120, width=320, gap=64:
  R1 x=24   "Multi-head (MHA)"        56 KV heads, 1344 KB/token
  R2 x=408  "Grouped-query (GQA)"     8 KV heads, 192 KB/token, 7x smaller
  R3 x=792  "Multi-query (MQA)"       1 KV head, 24 KB/token, 56x smaller  (end 1112)
  arrows: (344,120)-(406,120); (728,120)-(790,120)

Row B label (24,184) "SHARED-PREFIX CACHING ACROSS MANY REQUESTS"
Source box x=24 y=196 w=300 h=256 (196 to 452), center=(174,324) "Shared prefix, system prompt + tools, computed and cached once"
Target boxes x=388 w=280 h=64, gap=32:
  T1 y=196 center=228  "Request 1, unique suffix"
  T2 y=292 center=324  "Request 2, unique suffix"
  T3 y=388 center=420  "Request 3...N, unique suffixes"  (end 452, source right edge=324)
  arrows (straight horizontal, 0 bends): (324,228)-(386,228); (324,324)-(386,324); (324,420)-(386,420)

Footer caption centered (600,480).
-->
  <rect width="1200" height="496" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="600" y="32" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Two ways caching shrinks the memory bill: fewer duplicated heads, shared prefixes</text>

  <!-- Row A: per-token cache size by attention layout -->
  <text x="24" y="76" font-size="12" fill="#64748B">PER-TOKEN CACHE SIZE, BY ATTENTION LAYOUT</text>

  <rect x="24" y="88" width="320" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="184" y="114" font-size="14" fill="#064E3B" text-anchor="middle">Multi-head (MHA)</text>
  <text x="184" y="132" font-size="12" fill="#064E3B" text-anchor="middle">56 KV heads — 1,344 KB/token</text>

  <line x1="344" y1="120" x2="406" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="408" y="88" width="320" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="568" y="114" font-size="14" fill="#064E3B" text-anchor="middle">Grouped-query (GQA)</text>
  <text x="568" y="132" font-size="12" fill="#064E3B" text-anchor="middle">8 KV heads — 192 KB/tok (7x less)</text>

  <line x1="728" y1="120" x2="790" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="792" y="88" width="320" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="952" y="114" font-size="14" fill="#064E3B" text-anchor="middle">Multi-query (MQA)</text>
  <text x="952" y="132" font-size="12" fill="#064E3B" text-anchor="middle">1 KV head — 24 KB/tok (56x less)</text>

  <!-- Row B: shared-prefix caching across requests -->
  <text x="24" y="184" font-size="12" fill="#64748B">SHARED-PREFIX CACHING ACROSS MANY REQUESTS</text>

  <rect x="24" y="196" width="300" height="256" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="174" y="312" font-size="14" fill="#064E3B" text-anchor="middle">Shared prefix</text>
  <text x="174" y="330" font-size="12" fill="#064E3B" text-anchor="middle">system prompt + tools</text>
  <text x="174" y="348" font-size="12" fill="#064E3B" text-anchor="middle">computed &amp; cached once</text>

  <line x1="324" y1="228" x2="386" y2="228" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="388" y="196" width="280" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="528" y="222" font-size="14" fill="#1E1B4B" text-anchor="middle">Request 1</text>
  <text x="528" y="240" font-size="12" fill="#1E1B4B" text-anchor="middle">unique suffix only</text>

  <line x1="324" y1="324" x2="386" y2="324" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="388" y="292" width="280" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="528" y="318" font-size="14" fill="#1E1B4B" text-anchor="middle">Request 2</text>
  <text x="528" y="336" font-size="12" fill="#1E1B4B" text-anchor="middle">unique suffix only</text>

  <line x1="324" y1="420" x2="386" y2="420" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="388" y="388" width="280" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="528" y="414" font-size="14" fill="#1E1B4B" text-anchor="middle">Request 3…N</text>
  <text x="528" y="432" font-size="12" fill="#1E1B4B" text-anchor="middle">unique suffixes only</text>

  <text x="600" y="480" font-size="12" fill="#64748B" text-anchor="middle">Fewer duplicated heads shrinks every request's cache; a shared prefix is computed and stored once, not N times</text>
</svg>
