<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="384" viewBox="0 0 1200 384" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN
Canvas 1200x384. Title (600,32).
App node x=24 y=168 w=160 h=64 center=(104,200) role client/orange

Branch arrows from App right-mid (184,200), one L-bend each:
  local:  (184,200) -> (184,120) -> (262,120)   [enters L1 left edge at y=120, row A center]
  cloud:  (184,200) -> (184,280) -> (262,280)   [enters C1 left edge at y=280, row B center]

Row A label (264,76) "ON-DEVICE PATH, NO NETWORK HOP"
Row A boxes y=88 h=64 bottom=152 center=120, width=180, gap=64:
  L1 x=264  "Local runtime"           (service/indigo)
  L2 x=508  "Inference engine"        (service/indigo)
  L3 x=752  "Quantized model"         (LLM/violet)
  L4 x=996  "On-device response"      (client/orange)   end 1176
  arrows: (444,120)-(506,120); (688,120)-(750,120); (932,120)-(994,120)

Row B label (264,236) "CLOUD PATH, NETWORK ROUND TRIP"
Row B boxes y=248 h=64 bottom=312 center=280, width=256, gap=64:
  C1 x=264  "Cloud serving engine"    (service/indigo)
  C2 x=584  "Full-precision model"    (LLM/violet)
  C3 x=904  "Response over network"   (client/orange)   end 1160
  arrows: (520,280)-(582,280); (840,280)-(902,280)

Footer caption centered (600,352).
-->
  <rect width="1200" height="384" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="600" y="32" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Two paths for the same request: on-device (quantized, offline) vs. cloud (full-precision, networked)</text>

  <!-- App / client node -->
  <rect x="24" y="168" width="160" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="104" y="194" font-size="14" fill="#7C2D12" text-anchor="middle">App / client</text>
  <text x="104" y="212" font-size="12" fill="#7C2D12" text-anchor="middle">sends one request</text>

  <!-- branch to local path -->
  <polyline points="184,200 184,120 260,120" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- branch to cloud path -->
  <polyline points="184,200 184,280 260,280" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row A: on-device path -->
  <text x="264" y="76" font-size="12" fill="#64748B">ON-DEVICE PATH — NO NETWORK HOP</text>

  <rect x="264" y="88" width="180" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="354" y="114" font-size="14" fill="#1E1B4B" text-anchor="middle">Local runtime</text>
  <text x="354" y="132" font-size="12" fill="#1E1B4B" text-anchor="middle">1 user or concurrent</text>

  <line x1="444" y1="120" x2="506" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="508" y="88" width="180" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="598" y="114" font-size="14" fill="#1E1B4B" text-anchor="middle">Inference engine</text>
  <text x="598" y="132" font-size="12" fill="#1E1B4B" text-anchor="middle">llama.cpp or MLX</text>

  <line x1="688" y1="120" x2="750" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="752" y="88" width="180" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="842" y="114" font-size="14" fill="#2E1065" text-anchor="middle">Quantized model</text>
  <text x="842" y="132" font-size="12" fill="#2E1065" text-anchor="middle">compressed weights</text>

  <line x1="932" y1="120" x2="994" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="996" y="88" width="180" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="1086" y="114" font-size="14" fill="#7C2D12" text-anchor="middle">On-device response</text>
  <text x="1086" y="132" font-size="12" fill="#7C2D12" text-anchor="middle">works fully offline</text>

  <!-- Row B: cloud path -->
  <text x="264" y="236" font-size="12" fill="#64748B">CLOUD PATH — NETWORK ROUND TRIP</text>

  <rect x="264" y="248" width="256" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="392" y="274" font-size="14" fill="#1E1B4B" text-anchor="middle">Cloud serving engine</text>
  <text x="392" y="292" font-size="12" fill="#1E1B4B" text-anchor="middle">gateway + continuous batching</text>

  <line x1="520" y1="280" x2="582" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="584" y="248" width="256" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="712" y="274" font-size="14" fill="#2E1065" text-anchor="middle">Full-precision model</text>
  <text x="712" y="292" font-size="12" fill="#2E1065" text-anchor="middle">datacenter GPU</text>

  <line x1="840" y1="280" x2="902" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="904" y="248" width="256" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="1032" y="274" font-size="14" fill="#7C2D12" text-anchor="middle">Response over network</text>
  <text x="1032" y="292" font-size="12" fill="#7C2D12" text-anchor="middle">round trip added</text>

  <text x="600" y="352" font-size="12" fill="#64748B" text-anchor="middle">Same application, two runtime stacks — pick the path that fits privacy, latency, and volume</text>
</svg>
