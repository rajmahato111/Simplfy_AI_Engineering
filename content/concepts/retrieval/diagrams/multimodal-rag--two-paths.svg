  <rect x="232" y="404" width="176" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="320" y="433" font-size="14" fill="#1E1B4B" text-anchor="middle">Text index<tspan x="320" dy="17">search</tspan></text>

  <rect x="232" y="500" width="176" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="320" y="529" font-size="14" fill="#1E1B4B" text-anchor="middle">Visual index<tspan x="320" dy="17">search</tspan></text>

  <rect x="456" y="452" width="192" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="552" y="481" font-size="14" fill="#713F12" text-anchor="middle">Fusion &amp;<tspan x="552" dy="17">rerank</tspan></text>

  <rect x="712" y="452" width="176" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="800" y="481" font-size="14" fill="#2E1065" text-anchor="middle">VLM<tspan x="800" dy="17">Generator</tspan></text>

  <rect x="952" y="452" width="176" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="1040" y="481" font-size="14" fill="#7C2D12" text-anchor="middle">Answer<tspan x="1040" dy="17">with citations</tspan></text>
</svg>
