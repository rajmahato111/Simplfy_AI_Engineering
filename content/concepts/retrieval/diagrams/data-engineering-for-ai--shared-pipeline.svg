<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="528" viewBox="0 0 1200 528" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid)
Canvas 1200x528 (content ends y=416; QC headroom included in H).
Title center (600,44).

Container "One trunk, two consumers": x=24 y=80 w=1152 h=336 (24..1176, 80..416)
  caption (40,102)
  Trunk row y=200 h=64 (200..264) c_y=232
    Sources (green)                x=48  w=136 (48..184)   c=(116,232)
    Detect, parse and clean (indigo) x=248 w=232 (248..480) c=(364,232)
    Deduplicate (indigo)           x=544 w=176 (544..720)  c=(632,232)
    Govern: PII and consent (red)  x=784 w=232 (784..1016) c=(900,232)
  Branch Up, RAG path   y=104 h=64 (104..168) c_y=136
    Chunk and embed (green)  x=784 w=232 (784..1016) c=(900,136), same x as Govern
  Branch Down, fine-tune path y=328 h=64 (328..392) c_y=360
    Curate and decontaminate (green) x=784 w=232 (784..1016) c=(900,360), same x as Govern

Arrows (#475569, end 2px before target edge, one L-bend max):
  T1 Sources->DetectParseClean     (184,232)->(246,232)
  T2 DetectParseClean->Dedup       (480,232)->(542,232)
  T3 Dedup->Govern                 (720,232)->(782,232)
  U1 Govern->RAGBranch (up)        (900,200)->(900,170)
  D1 Govern->FineTuneBranch (down) (900,264)->(900,326)
-->
  <rect width="1200" height="528" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="600" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">One shared pipeline, two consumers</text>

  <!-- group container -->
  <rect x="24" y="80" width="1152" height="336" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="40" y="102" font-size="12" fill="#64748B">Detect, parse, clean, dedup, and govern once, then diverge</text>

  <!-- trunk arrows -->
  <line x1="184" y1="232" x2="246" y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="232" x2="542" y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="232" x2="782" y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- branch arrows -->
  <line x1="900" y1="200" x2="900" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="264" x2="900" y2="326" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- trunk nodes -->
  <rect x="48" y="200" width="136" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="116" y="237" font-size="14" fill="#064E3B" text-anchor="middle">Sources</text>

  <rect x="248" y="200" width="232" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="364" y="229" font-size="14" fill="#1E1B4B" text-anchor="middle">Detect, parse<tspan x="364" dy="17">and clean</tspan></text>

  <rect x="544" y="200" width="176" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="632" y="237" font-size="14" fill="#1E1B4B" text-anchor="middle">Deduplicate</text>

  <rect x="784" y="200" width="232" height="64" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="900" y="229" font-size="14" fill="#7F1D1D" text-anchor="middle">Govern: PII<tspan x="900" dy="17">and consent</tspan></text>

  <!-- branch up: RAG -->
  <rect x="784" y="104" width="232" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="900" y="133" font-size="14" fill="#064E3B" text-anchor="middle">Chunk, embed</text>
  <text x="900" y="150" font-size="14" fill="#064E3B" text-anchor="middle">to vector store</text>

  <!-- branch down: fine-tuning -->
  <rect x="784" y="328" width="232" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="900" y="357" font-size="14" fill="#064E3B" text-anchor="middle">Curate, decontam.</text>
  <text x="900" y="374" font-size="14" fill="#064E3B" text-anchor="middle">to training records</text>
</svg>
