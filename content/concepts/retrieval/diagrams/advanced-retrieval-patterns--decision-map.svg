<svg xmlns="http://www.w3.org/2000/svg" width="1184" height="592" viewBox="0 0 1184 592" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid)
Canvas 1184x592. Title center (592,44).
Container (routing zone): x=200 y=72 w=808 h=392 -> 200..1008, 72..464. caption (216,94)

Single-row nodes, all center y=264, h=64 (y=232..296):
  Query (orange)      x=32  w=120 -> 32..152,  c=(92,264)   [outside container]
  Shape check (yellow)x=216 w=140 -> 216..356, c=(286,264)
  Base retriever (grn)x=660 w=120 -> 660..780, c=(720,264)
  Fusion RRF (yellow) x=844 w=120 -> 844..964, c=(904,264)
  Generator (violet)  x=1028 w=120 -> 1028..1148, c=(1088,264) [outside container]

Pattern column (indigo), x=420 w=176, 4 rows, 32px row gaps:
  R1 Query decomposition   y=88  -> 420..596, 88..152,  c=(508,120)
  R2 HyDE                  y=184 -> 420..596, 184..248, c=(508,216)
  R3 Multi-query expansion y=280 -> 420..596, 280..344, c=(508,312)
  R4 Self-query filter     y=376 -> 420..596, 376..440, c=(508,408)

Fan-out bus (plain line, no arrowhead on trunk; arrowhead only on each stub into a box):
  Trunk A at x=384, vertical y=120..408 (spans outermost row centers)
  Stub  shapecheck->trunk: (356,264)-(384,264) plain
  Stubs trunk->rows: (384,120)-(418,120) arrow; (384,216)-(418,216) arrow;
                     (384,312)-(418,312) arrow; (384,408)-(418,408) arrow

Fan-in bus (same idiom):
  Trunk B at x=618, vertical y=120..408
  Stubs rows->trunk: (596,120)-(618,120) plain; (596,216)-(618,216) plain;
                     (596,312)-(618,312) plain; (596,408)-(618,408) plain
  Stub  trunk->retriever: (618,264)-(658,264) arrow

Main arrows:
  A1 query->shapecheck   (152,264)->(214,264)
  A2 retriever->fusion    (780,264)->(842,264)
  A3 fusion->generator    (964,264)->(1026,264)
-->
  <rect width="1184" height="592" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="592" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Advanced retrieval patterns: match the fix to the query shape</text>

  <rect x="200" y="72" width="808" height="392" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="216" y="94" font-size="12" fill="#64748B">Route by shape</text>

  <!-- fan-out bus: shape check -> patterns -->
  <line x1="356" y1="264" x2="384" y2="264" stroke="#475569" stroke-width="1.5"/>
  <line x1="384" y1="120" x2="384" y2="408" stroke="#475569" stroke-width="1.5"/>
  <line x1="384" y1="120" x2="418" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="384" y1="216" x2="418" y2="216" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="384" y1="312" x2="418" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="384" y1="408" x2="418" y2="408" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- fan-in bus: patterns -> retriever -->
  <line x1="596" y1="120" x2="618" y2="120" stroke="#475569" stroke-width="1.5"/>
  <line x1="596" y1="216" x2="618" y2="216" stroke="#475569" stroke-width="1.5"/>
  <line x1="596" y1="312" x2="618" y2="312" stroke="#475569" stroke-width="1.5"/>
  <line x1="596" y1="408" x2="618" y2="408" stroke="#475569" stroke-width="1.5"/>
  <line x1="618" y1="120" x2="618" y2="408" stroke="#475569" stroke-width="1.5"/>
  <line x1="618" y1="264" x2="658" y2="264" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- main arrows -->
  <line x1="152" y1="264" x2="214" y2="264" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="264" x2="842" y2="264" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="964" y1="264" x2="1026" y2="264" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- column: query -->
  <rect x="32" y="232" width="120" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="92" y="269" font-size="14" fill="#7C2D12" text-anchor="middle">Query</text>

  <!-- column: shape check -->
  <rect x="216" y="232" width="140" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="286" y="261" font-size="14" fill="#713F12" text-anchor="middle">What shape<tspan x="286" dy="17">is this query?</tspan></text>

  <!-- pattern column -->
  <rect x="420" y="88" width="176" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="508" y="117" font-size="14" fill="#1E1B4B" text-anchor="middle">Query<tspan x="508" dy="17">decomposition</tspan></text>

  <rect x="420" y="184" width="176" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="508" y="221" font-size="14" fill="#1E1B4B" text-anchor="middle">HyDE</text>

  <rect x="420" y="280" width="176" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="508" y="309" font-size="14" fill="#1E1B4B" text-anchor="middle">Multi-query<tspan x="508" dy="17">expansion</tspan></text>

  <rect x="420" y="376" width="176" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="508" y="405" font-size="14" fill="#1E1B4B" text-anchor="middle">Self-query<tspan x="508" dy="17">metadata filter</tspan></text>

  <!-- column: base retriever -->
  <rect x="660" y="232" width="120" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="720" y="261" font-size="14" fill="#064E3B" text-anchor="middle">Base<tspan x="720" dy="17">retriever</tspan></text>

  <!-- column: fusion -->
  <rect x="844" y="232" width="120" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="904" y="261" font-size="14" fill="#713F12" text-anchor="middle">Fusion<tspan x="904" dy="17">(RRF)</tspan></text>

  <!-- column: generator -->
  <rect x="1028" y="232" width="120" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1088" y="269" font-size="14" fill="#2E1065" text-anchor="middle">Generator</text>
</svg>
