<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
Two-stage funnel left to right.
Stage 1 wide: Bi-encoder ANN over corpus -> top 100 (green index, indigo service)
Stage 2 narrow: Cross-encoder scores each pair -> top 10 (violet LLM box)
-->
  <rect width="880" height="520" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="440" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Reranking: wide bi-encoder recall, narrow cross-encoder precision</text>

  <rect x="32" y="80" width="360" height="200" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="102" font-size="12" fill="#64748B">Stage 1  retrieval (bi-encoder)</text>

  <rect x="56" y="128" width="112" height="56" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="112" y="161" font-size="14" fill="#7C2D12" text-anchor="middle">Query</text>
  <line x1="168" y1="156" x2="198" y2="156" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="128" width="160" height="56" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="280" y="153" font-size="14" fill="#064E3B" text-anchor="middle">Vector index<tspan x="280" dy="17">(millions of chunks)</tspan></text>

  <text x="212" y="220" font-size="13" fill="#334155" text-anchor="middle">Cosine ANN ’ top 100</text>
  <text x="212" y="240" font-size="12" fill="#64748B" text-anchor="middle">~3050 ms · embeddings precomputed</text>

  <line x1="392" y1="180" x2="432" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="88" y="268" width="248" height="40" rx="8" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="212" y="293" font-size="13" fill="#713F12" text-anchor="middle">100 candidates (recall-focused)</text>

  <rect x="432" y="80" width="416" height="360" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="448" y="102" font-size="12" fill="#64748B">Stage 2  reranking (cross-encoder)</text>

  <rect x="464" y="140" width="352" height="72" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="640" y="172" font-size="14" fill="#2E1065" text-anchor="middle">Cross-encoder</text>
  <text x="640" y="192" font-size="12" fill="#2E1065" text-anchor="middle">jointly encodes [query + each candidate]</text>

  <text x="640" y="248" font-size="13" fill="#334155" text-anchor="middle">100 forward passes (batched)</text>
  <text x="640" y="268" font-size="12" fill="#64748B" text-anchor="middle">~40120 ms depending on model + batch</text>

  <rect x="520" y="296" width="240" height="48" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="325" font-size="14" fill="#064E3B" text-anchor="middle">Top 510 for LLM context</text>

  <line x1="336" y1="288" x2="464" y2="176" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="344" x2="640" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="560" y="400" width="160" height="56" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="640" y="433" font-size="14" fill="#7C2D12" text-anchor="middle">Grounded answer</text>

  <text x="440" y="488" font-size="12" fill="#64748B" text-anchor="middle">Bi-encoder cannot see querydoc token interactions; cross-encoder can  that is the quality gap.</text>
</svg>
