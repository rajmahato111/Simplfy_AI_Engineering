<svg xmlns="http://www.w3.org/2000/svg" width="1176" height="480" viewBox="0 0 1176 480" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid, 24px padding)
Canvas 1176x480. Title center (588,44).

Nodes (h=64 unless noted):
  Query embedding (orange)   x=48   y=248 w=160 -> 48..208,   c=(128,280)
  Metadata filter (yellow)   x=344  y=112 w=200 -> 344..544,  c=(444,144)
  ANN index (green)          x=344  y=248 w=200 -> 344..544,  c=(444,280)
  Payload store (green)      x=632  y=248 w=176 -> 632..808,  c=(720,280)
  Top-k chunks (orange)      x=896  y=248 w=144 -> 896..1040, c=(968,280)
  Post-filter trap (red, h=80, 3 lines) x=344 y=376 w=400 -> 344..744, c=(544,416)

Container "Vector database": x=328 y=224 w=504 h=112 -> 328..832, 224..336. Caption (344,246).
  Wraps ANN index + Payload store (both are DB-internal). Metadata filter and
  Query embedding are caller-supplied query inputs, drawn outside the container.
  Metadata filter feeds directly into the ANN index (not a separate stage before
  or after it) to show pre-filtering happens DURING the graph walk.

Arrows (#475569, end 2px before target edge):
  A1 Query embedding -> ANN index   (208,280)->(342,280)          straight
  A2 Metadata filter -> ANN index   (444,176)->(444,246)          straight vertical, label "allow-list"
  A3 ANN index -> Payload store     (544,280)->(630,280)          straight, label "top-k IDs"
  A4 Payload store -> Top-k chunks  (808,280)->(894,280)          straight, label "chunk text"
  Post-filter trap is a callout (no arrow), placed below the container.
-->
  <rect width="1176" height="480" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="588" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Inside a filtered vector query</text>

  <!-- container -->
  <rect x="328" y="224" width="504" height="112" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="344" y="246" font-size="12" fill="#64748B">Vector database</text>

  <!-- arrows -->
  <line x1="208" y1="280" x2="342" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="444" y1="176" x2="444" y2="246" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="544" y1="280" x2="630" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="808" y1="280" x2="894" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrow labels (white backing) -->
  <rect x="452" y="200" width="62" height="18" fill="#ffffff"/>
  <text x="483" y="213" font-size="12" fill="#475569" text-anchor="middle">allow-list</text>
  <rect x="548" y="253" width="62" height="18" fill="#ffffff"/>
  <text x="579" y="266" font-size="12" fill="#475569" text-anchor="middle">top-k IDs</text>
  <rect x="812" y="253" width="70" height="18" fill="#ffffff"/>
  <text x="847" y="266" font-size="12" fill="#475569" text-anchor="middle">chunk text</text>

  <!-- nodes -->
  <rect x="48" y="248" width="160" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="128" y="277" font-size="14" fill="#7C2D12" text-anchor="middle">Query<tspan x="128" dy="17">embedding</tspan></text>

  <rect x="344" y="112" width="200" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="444" y="141" font-size="14" fill="#713F12" text-anchor="middle">Metadata filter<tspan x="444" dy="17">(tenant, date)</tspan></text>

  <rect x="344" y="248" width="200" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="444" y="277" font-size="14" fill="#064E3B" text-anchor="middle">ANN index<tspan x="444" dy="17">(HNSW graph)</tspan></text>

  <rect x="632" y="248" width="176" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="720" y="277" font-size="14" fill="#064E3B" text-anchor="middle">Payload store<tspan x="720" dy="17">(text + metadata)</tspan></text>

  <rect x="896" y="248" width="144" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="968" y="277" font-size="14" fill="#7C2D12" text-anchor="middle">Top-k<tspan x="968" dy="17">chunks</tspan></text>

  <!-- annotation: post-filter trap -->
  <rect x="344" y="376" width="400" height="80" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="544" y="399" font-size="12" fill="#7F1D1D" text-anchor="middle">Filtering AFTER the graph walk can<tspan x="544" dy="16">return zero rows on a narrow filter —</tspan><tspan x="544" dy="16">the allow-list must reach the walk itself</tspan></text>
</svg>
