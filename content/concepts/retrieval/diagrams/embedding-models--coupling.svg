<svg xmlns="http://www.w3.org/2000/svg" width="1088" height="312" viewBox="0 0 1088 312" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid, 24px padding)
Canvas 1088x312. Title center (544,44). Content bottom y=288.

Nodes (h=64 unless noted):
  Source documents (green)   x=48  w=168 y=96   -> 48..216,   c=(132,128)
  User question (orange)     x=48  w=168 y=224  -> 48..216,   c=(132,256)
  Embedding model v1 (violet) x=344 w=192 y=160 -> 344..536,  c=(440,192)
  Vector index (green)       x=624 w=176 y=160  -> 624..800,  c=(712,192)
  Swap warning (red, h=112)  x=864 w=200 y=136  -> 864..1064, c=(964,192)

Arrows (#475569, one L-bend max, end 2px before target edge):
  A1 Docs -> model top      (216,128)->(440,128)->(440,158)   label "chunks, offline"
  A2 Question -> model bottom (216,256)->(440,256)->(440,226) label "question, per query"
  A3 Model -> index         (536,192)->(622,192)              label "v1 vectors"
  A4 Index -> warning       (800,192)->(862,192)
-->
  <rect width="1088" height="312" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="544" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">The embedding coupling: documents and queries share one model</text>

  <!-- arrows -->
  <polyline points="216,128 440,128 440,158" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="216,256 440,256 440,226" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="536" y1="192" x2="622" y2="192" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="192" x2="862" y2="192" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrow labels (white backing) -->
  <rect x="236" y="107" width="96" height="18" fill="#ffffff"/>
  <text x="284" y="120" font-size="12" fill="#475569" text-anchor="middle">chunks, offline</text>
  <rect x="228" y="235" width="112" height="18" fill="#ffffff"/>
  <text x="284" y="248" font-size="12" fill="#475569" text-anchor="middle">question, per query</text>
  <rect x="545" y="165" width="68" height="18" fill="#ffffff"/>
  <text x="579" y="178" font-size="12" fill="#475569" text-anchor="middle">v1 vectors</text>

  <!-- nodes -->
  <rect x="48" y="96" width="168" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="132" y="125" font-size="14" fill="#064E3B" text-anchor="middle">Source<tspan x="132" dy="17">documents</tspan></text>

  <rect x="48" y="224" width="168" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="132" y="253" font-size="14" fill="#7C2D12" text-anchor="middle">User<tspan x="132" dy="17">question</tspan></text>

  <rect x="344" y="160" width="192" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="440" y="189" font-size="14" fill="#2E1065" text-anchor="middle">Embedding model<tspan x="440" dy="17">(v1, pinned)</tspan></text>

  <rect x="624" y="160" width="176" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="712" y="189" font-size="14" fill="#064E3B" text-anchor="middle">Vector index<tspan x="712" dy="17">(v1 vectors)</tspan></text>

  <rect x="864" y="136" width="200" height="112" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="964" y="180" font-size="14" fill="#7F1D1D" text-anchor="middle">Swap to v2?<tspan x="964" dy="17">Re-embed every</tspan><tspan x="964" dy="17">chunk first</tspan></text>
</svg>
