<svg xmlns="http://www.w3.org/2000/svg" width="1136" height="496" viewBox="0 0 1136 496" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid)
Canvas 1136x496. Title center (568,44).
Container: x=32 y=64 w=1072 h=296 -> 32..1104, 64..360. caption (48,86)

Main row (chunk path), y=160 h=64 (160..224):
  Source document (green)  x=48  w=144 -> 48..192,  c=(120,192)
  Chunker (indigo)          x=280 w=144 -> 280..424, c=(352,192)
  Contextualizer (violet)   x=568 w=208 -> 568..776, c=(672,192)

Fan-out targets, w=168:
  Vector index (green)  x=904 y=88  h=64 -> 904..1072, 88..152,  c=(988,120)
  BM25 index (green)    x=904 y=264 h=64 -> 904..1072, 264..328, c=(988,296)

Fan-out bus: trunk at x=840, vertical 120..296 (spans the two target centers)
  stub from contextualizer: (776,192)-(840,192) plain (T-junction on trunk)
  stub to vector index:     (840,120)-(902,120) arrow, label "embed"
  stub to BM25 index:       (840,296)-(902,296) arrow, label "index"

Main arrows:
  A1 source->chunker        (192,192)->(278,192)
  A2 chunker->contextualizer (424,192)->(566,192) label "raw chunk" above
-->
  <rect width="1136" height="496" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="568" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Contextual retrieval: enrich the chunk before it's indexed</text>

  <rect x="32" y="64" width="1072" height="296" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="86" font-size="12" fill="#64748B">Ingestion pipeline (runs once per document)</text>

  <!-- main arrows -->
  <line x1="192" y1="192" x2="278" y2="192" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="424" y1="192" x2="566" y2="192" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- fan-out bus -->
  <line x1="776" y1="192" x2="840" y2="192" stroke="#475569" stroke-width="1.5"/>
  <line x1="840" y1="120" x2="840" y2="296" stroke="#475569" stroke-width="1.5"/>
  <line x1="840" y1="120" x2="902" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="296" x2="902" y2="296" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- labels -->
  <rect x="428" y="164" width="90" height="18" fill="#ffffff"/>
  <text x="432" y="177" font-size="12" fill="#475569">raw chunk</text>
  <rect x="848" y="102" width="60" height="18" fill="#ffffff"/>
  <text x="852" y="115" font-size="12" fill="#475569">embed</text>
  <rect x="848" y="278" width="54" height="18" fill="#ffffff"/>
  <text x="852" y="291" font-size="12" fill="#475569">index</text>

  <!-- nodes -->
  <rect x="48" y="160" width="144" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="120" y="189" font-size="14" fill="#064E3B" text-anchor="middle">Source<tspan x="120" dy="17">document</tspan></text>

  <rect x="280" y="160" width="144" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="352" y="197" font-size="14" fill="#1E1B4B" text-anchor="middle">Chunker</text>

  <rect x="568" y="160" width="208" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="672" y="189" font-size="14" fill="#2E1065" text-anchor="middle">Contextualizer (LLM)<tspan x="672" dy="17">chunk + cached full doc</tspan></text>

  <rect x="904" y="88" width="168" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="988" y="117" font-size="14" fill="#064E3B" text-anchor="middle">Vector index<tspan x="988" dy="17">(contextual embed)</tspan></text>

  <rect x="904" y="264" width="168" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="988" y="293" font-size="14" fill="#064E3B" text-anchor="middle">BM25 index<tspan x="988" dy="17">(contextual keyword)</tspan></text>
</svg>
