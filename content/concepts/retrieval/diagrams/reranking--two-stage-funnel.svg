<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="368" viewBox="0 0 1200 368" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid, 24px padding)
Canvas 1200x368. Title center (600,44).

Nodes (h=88, row y=160..248, center y=204):
  Corpus (green)                x=48   w=160 -> 48..208,    c=(128,204)
  Bi-encoder retrieval (indigo) x=328  w=224 -> 328..552,   c=(440,204)
  Cross-encoder rerank (violet) x=672  w=224 -> 672..896,   c=(784,204)
  LLM prompt (orange)           x=1016 w=160 -> 1016..1176, c=(1096,204)
  (120px gaps between columns to leave room for arrow labels)

Latency/quality note (neutral, h=56): x=328 y=280 w=568 -> 328..896, c=(612,308)

Arrows (#475569, straight, edge midpoint to edge midpoint, end 2px before target):
  A1 Corpus -> Bi-encoder       (208,204)->(326,204)   label "ANN search"   centered x=268
  A2 Bi-encoder -> Cross-enc    (552,204)->(670,204)   label "candidates"   centered x=612
  A3 Cross-enc -> LLM prompt    (896,204)->(1014,204)  label "survivors"    centered x=956
  Label rects: w=100 h=18 y=178..196, text baseline y=191 (8px clearance above line at y=204)
-->
  <rect width="1200" height="368" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="600" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">The two-stage funnel: fast and broad, then slow and sharp</text>

  <!-- arrows -->
  <line x1="208" y1="204" x2="326" y2="204" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="552" y1="204" x2="670" y2="204" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="896" y1="204" x2="1014" y2="204" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrow labels (white backing) -->
  <rect x="218" y="178" width="100" height="18" fill="#ffffff"/>
  <text x="268" y="191" font-size="12" fill="#475569" text-anchor="middle">ANN search</text>
  <rect x="562" y="178" width="100" height="18" fill="#ffffff"/>
  <text x="612" y="191" font-size="12" fill="#475569" text-anchor="middle">candidates</text>
  <rect x="906" y="178" width="100" height="18" fill="#ffffff"/>
  <text x="956" y="191" font-size="12" fill="#475569" text-anchor="middle">survivors</text>

  <!-- nodes -->
  <rect x="48" y="160" width="160" height="88" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="128" y="197" font-size="14" fill="#064E3B" text-anchor="middle">Corpus<tspan x="128" dy="17">10M chunks</tspan></text>

  <rect x="328" y="160" width="224" height="88" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="440" y="197" font-size="14" fill="#1E1B4B" text-anchor="middle">Bi-encoder retrieval<tspan x="440" dy="17">Top 50, fast (ms)</tspan></text>

  <rect x="672" y="160" width="224" height="88" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="784" y="197" font-size="14" fill="#2E1065" text-anchor="middle">Cross-encoder rerank<tspan x="784" dy="17">Top 5, slow (10-100ms)</tspan></text>

  <rect x="1016" y="160" width="160" height="88" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="1096" y="197" font-size="14" fill="#7C2D12" text-anchor="middle">LLM prompt<tspan x="1096" dy="17">grounded answer</tspan></text>

  <!-- latency/quality note -->
  <rect x="328" y="280" width="568" height="56" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="612" y="303" font-size="12" fill="#334155" text-anchor="middle">Bi-encoder: O(1) per doc, sees query and doc separately</text>
  <text x="612" y="321" font-size="12" fill="#334155" text-anchor="middle">Cross-encoder: O(n) per query, sees query and doc together</text>
</svg>
