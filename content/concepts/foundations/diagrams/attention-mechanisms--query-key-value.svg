<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="760" viewBox="0 0 1160 760" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid, 24px padding)
Canvas 1160x760. Title center (580,44).

Container "Input sequence" (dashed): x=56 y=90 w=700 h=100 -> 56..756, 90..190. Caption (72,112).
  mini token boxes (orange, h=40, y=130..170, c_y=150), gap 16:
    The       112..212 (100) c=162
    trophy    228..388 (160) c=308
    suitcase  404..594 (190) c=499
    it        610..700 (90)  c=655   <- the focal / query token

  Arrows down from container bottom (1 bend not needed, straight vertical):
    (300,190)->(300,252)   into Keys & Values container top
    (740,190)->(740,252)   into Query box top
    label "Query comes from 'it'" near (740,222)

Container "Keys & Values (every token)" (dashed): x=56 y=254 w=520 h=100 -> 56..576, 254..354. Caption (72,276).
  mini K,V boxes (indigo, h=40, y=294..334, c_y=314), gap 16, uniform 104 wide:
    The      84..188  (104) c=136
    trophy   204..308 (104) c=256
    suitcase 324..428 (104) c=376
    it       444..548 (104) c=496

Box "Query" (purple): x=640 y=254 w=200 h=64 -> 640..840, 254..318, c=(740,286). "Query" / "(from \"it\")"

Box "Score each pair," / "scale + softmax" (indigo): x=300 y=418 w=360 h=64 -> 300..660, 418..482, c=(480,450)
  Arrows in (1 bend each, entering left/right edge at vertical center y=450):
    KeysValues bottom (316,354) -> down -> (316,450) -> left -> (298,450) [enters left edge]
    Query bottom (740,318) -> down -> (740,450) -> left -> (662,450) [enters right edge]

Box "Weighted sum of values" (indigo): x=300 y=560 w=360 h=64 -> 560..624, c=(480,592)
  "Weighted sum of values" / "71% trophy, 9% suitcase, 20% other"
  Arrow: (480,482)->(480,558) straight vertical

Box "Updated representation" (purple): x=300 y=656 w=360 h=64 -> 656..720, c=(480,688)
  "Updated representation" / "for \"it\""
  Arrow: (480,624)->(480,654) straight vertical
-->
  <rect width="1160" height="760" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="580" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Query meets every key, scores become weights, weights blend the values</text>

  <!-- Input sequence container -->
  <rect x="56" y="90" width="700" height="100" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="72" y="112" font-size="12" fill="#64748B">Input sequence</text>

  <rect x="112" y="130" width="100" height="40" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="162" y="154" font-size="12" fill="#7C2D12" text-anchor="middle">The</text>
  <rect x="228" y="130" width="160" height="40" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="308" y="154" font-size="12" fill="#7C2D12" text-anchor="middle">trophy</text>
  <rect x="404" y="130" width="190" height="40" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="499" y="154" font-size="12" fill="#7C2D12" text-anchor="middle">suitcase</text>
  <rect x="610" y="130" width="90" height="40" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="655" y="154" font-size="12" fill="#7C2D12" text-anchor="middle">it</text>

  <!-- arrows from sequence to KV container and Query box -->
  <line x1="300" y1="190" x2="300" y2="252" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="190" x2="740" y2="252" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="662" y="212" width="156" height="18" fill="#ffffff"/>
  <text x="740" y="225" font-size="12" fill="#475569" text-anchor="middle">query comes from "it"</text>

  <!-- Keys & Values container -->
  <rect x="56" y="254" width="520" height="100" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="72" y="276" font-size="12" fill="#64748B">Keys &amp; Values (every token)</text>

  <rect x="84" y="294" width="104" height="40" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="136" y="318" font-size="12" fill="#1E1B4B" text-anchor="middle">The</text>
  <rect x="204" y="294" width="104" height="40" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="256" y="318" font-size="12" fill="#1E1B4B" text-anchor="middle">trophy</text>
  <rect x="324" y="294" width="104" height="40" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="376" y="318" font-size="12" fill="#1E1B4B" text-anchor="middle">suitcase</text>
  <rect x="444" y="294" width="104" height="40" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="496" y="318" font-size="12" fill="#1E1B4B" text-anchor="middle">it</text>

  <!-- Query box -->
  <rect x="640" y="254" width="200" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="740" y="283" font-size="14" fill="#2E1065" text-anchor="middle">Query<tspan x="740" dy="17" font-size="12">(from "it")</tspan></text>

  <!-- converging arrows into Score box -->
  <polyline points="316,354 316,450 298,450" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="740,318 740,450 662,450" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Score box -->
  <rect x="300" y="418" width="360" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="480" y="447" font-size="14" fill="#1E1B4B" text-anchor="middle">Score each pair,<tspan x="480" dy="17">scale + softmax</tspan></text>

  <!-- Weighted sum box -->
  <line x1="480" y1="482" x2="480" y2="558" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="300" y="560" width="360" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="480" y="589" font-size="14" fill="#1E1B4B" text-anchor="middle">Weighted sum of values<tspan x="480" dy="17" font-size="12">71% trophy, 9% suitcase, 20% other</tspan></text>

  <!-- Output box -->
  <line x1="480" y1="624" x2="480" y2="654" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="300" y="656" width="360" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="480" y="685" font-size="14" fill="#2E1065" text-anchor="middle">Updated representation<tspan x="480" dy="17" font-size="12">for "it"</tspan></text>
</svg>
