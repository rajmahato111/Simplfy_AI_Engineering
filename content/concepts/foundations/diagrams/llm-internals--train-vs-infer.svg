<svg xmlns="http://www.w3.org/2000/svg" width="1064" height="780" viewBox="0 0 1064 780" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid, 24px padding)
Canvas 1064x780. Title center (532,44).

Container 1 "Training" (dashed): x=56 y=80 w=944 h=144 (56..1000, 80..224), caption (72,102)
  Training corpus (green)        x=72  y=128 w=176 -> 72..248,  128..192 c=(160,160)
  Predict + update (indigo)      x=324 y=128 w=224 -> 324..548, 128..192 c=(436,160) "Predict next token," / "nudge the weights"
  Arrow: corpus->predict (248,160)->(322,160), label "repeated billions of times" below

Bridge node (outside both containers, purple LLM component):
  Frozen weights x=336 y=264 w=200 h=64 -> 336..536, 264..328 c=(436,296) "Frozen weights" / "(the trained model)"
  Arrow: predict->weights straight vertical (436,192)->(436,262), label "training run ends" beside it

Container 2 "Inference" (dashed): x=56 y=376 w=760 h=368 (56..816, 376..744), caption (72,398)
  Forward pass (purple)   x=348 y=424 w=176 -> 348..524, 424..488 c=(436,456) "Forward pass" / "(frozen weights)"
  Prompt so far (orange)  x=88  y=624 w=160 -> 88..248,  624..688 c=(168,656) "Prompt so far" / "(grows each step)"
  Sample token (indigo)   x=576 y=624 w=160 -> 576..736, 624..688 c=(656,656) "Sample token"
  Final response (orange, outside container) x=880 y=408 w=160 -> 880..1040, 408..472 c=(960,440)

  Arrow: weights->forward pass straight vertical (436,328)->(436,422), label "same weights, every request" beside it
  Loop arrows (orthogonal, <=1 bend, end 2px before target edge):
    ForwardPass->Sample     polyline (524,472)->(656,472)->(656,622)
    Sample->Prompt          line     (576,656)->(250,656)
    Prompt->ForwardPass     polyline (168,624)->(168,456)->(346,456)
    ForwardPass->FinalResp  line     (524,440)->(878,440)

  Arrow labels (12px, white backing):
    "produces probabilities" centered (594,493) for ForwardPass->Sample
    "append sampled token" centered (413,677) for Sample->Prompt
    "EOS or max length reached" centered (701,431) for ForwardPass->FinalResp
-->
  <rect width="1064" height="780" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="532" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Training builds frozen weights; inference runs them, one token at a time</text>

  <!-- Container 1: Training -->
  <rect x="56" y="80" width="944" height="144" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="72" y="102" font-size="12" fill="#64748B">Training — happens once per model version; the predict-and-nudge step below repeats billions of times</text>

  <line x1="248" y1="160" x2="322" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="72" y="128" width="176" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="165" font-size="14" fill="#064E3B" text-anchor="middle">Training corpus</text>

  <rect x="324" y="128" width="224" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="436" y="157" font-size="14" fill="#1E1B4B" text-anchor="middle">Predict next token,<tspan x="436" dy="17">nudge the weights</tspan></text>

  <!-- Bridge: frozen weights -->
  <line x1="436" y1="192" x2="436" y2="262" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="446" y="219" width="128" height="18" fill="#ffffff"/>
  <text x="510" y="232" font-size="12" fill="#475569" text-anchor="middle">training run ends</text>

  <rect x="336" y="264" width="200" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="436" y="293" font-size="14" fill="#2E1065" text-anchor="middle">Frozen weights<tspan x="436" dy="17">(the trained model)</tspan></text>

  <line x1="436" y1="328" x2="436" y2="422" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="448" y="343" width="210" height="18" fill="#ffffff"/>
  <text x="553" y="356" font-size="12" fill="#475569" text-anchor="middle">same weights, every request</text>

  <!-- Container 2: Inference -->
  <rect x="56" y="376" width="760" height="368" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="72" y="398" font-size="12" fill="#64748B">Inference — every request, weights never change</text>

  <!-- loop arrows -->
  <polyline points="524,472 656,472 656,622" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="576" y1="656" x2="250" y2="656" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="168,624 168,456 346,456" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="524" y1="440" x2="878" y2="440" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrow labels -->
  <rect x="524" y="484" width="140" height="18" fill="#ffffff"/>
  <text x="594" y="497" font-size="12" fill="#475569" text-anchor="middle">produces probabilities</text>

  <rect x="343" y="664" width="140" height="18" fill="#ffffff"/>
  <text x="413" y="677" font-size="12" fill="#475569" text-anchor="middle">append sampled token</text>

  <rect x="611" y="418" width="180" height="18" fill="#ffffff"/>
  <text x="701" y="431" font-size="12" fill="#475569" text-anchor="middle">EOS or max length reached</text>

  <!-- nodes -->
  <rect x="348" y="424" width="176" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="436" y="453" font-size="14" fill="#2E1065" text-anchor="middle">Forward pass<tspan x="436" dy="17">(frozen weights)</tspan></text>

  <rect x="88" y="624" width="160" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="168" y="653" font-size="14" fill="#7C2D12" text-anchor="middle">Prompt so far<tspan x="168" dy="17">(grows each step)</tspan></text>

  <rect x="576" y="624" width="160" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="656" y="661" font-size="14" fill="#1E1B4B" text-anchor="middle">Sample token</text>

  <rect x="880" y="408" width="160" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="960" y="445" font-size="14" fill="#7C2D12" text-anchor="middle">Final response</text>
</svg>
