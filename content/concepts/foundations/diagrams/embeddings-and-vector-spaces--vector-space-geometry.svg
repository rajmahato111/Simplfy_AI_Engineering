<svg xmlns="http://www.w3.org/2000/svg" width="960" height="528" viewBox="0 0 960 528" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN
Canvas 960x528. Title at (480,40).
Two dashed containers, y=64..504 (h=440):
  Left  "Encoding text into a vector": x=32..456
    3 text boxes (56,128/188/248 w136 h44) -> Encoder box (232,128 w112 h164)
    -> mini "vector space" box (384,160 w112 h100) with 3 dots
    -> note box (56,330 w356 h64) about dimensionality
  Right "Measuring similarity": x=504..928
    Coordinate plot: origin (560,440), x-axis to (900,440), y-axis to (560,140)
    3 rays from origin to points: cat (815,345 violet), kitten (790,315 green), car (615,170 orange)
    Dashed line cat<->car = Euclidean distance
    Text notes for cosine values near each pair
-->
  <rect width="960" height="528" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="480" y="40" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Text becomes coordinates; distance becomes meaning</text>

  <!-- LEFT PANEL -->
  <rect x="32" y="64" width="424" height="440" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="90" font-size="12" fill="#64748B">Encoding text into a vector</text>

  <rect x="56" y="128" width="136" height="44" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="124" y="155" font-size="14" fill="#7C2D12" text-anchor="middle">&#8220;cat&#8221;</text>
  <rect x="56" y="188" width="136" height="44" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="124" y="215" font-size="14" fill="#7C2D12" text-anchor="middle">&#8220;kitten&#8221;</text>
  <rect x="56" y="248" width="136" height="44" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="124" y="275" font-size="14" fill="#7C2D12" text-anchor="middle">&#8220;car&#8221;</text>

  <rect x="232" y="128" width="112" height="164" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="288" y="215" font-size="14" fill="#2E1065" text-anchor="middle">Encoder</text>

  <line x1="192" y1="150" x2="230" y2="150" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="192" y1="210" x2="230" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="192" y1="270" x2="230" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="344" y1="210" x2="382" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="384" y="160" width="112" height="100" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="440" y="176" font-size="10" fill="#064E3B" text-anchor="middle">vector space</text>
  <circle cx="455" cy="216" r="4" fill="#059669"/>
  <circle cx="462" cy="208" r="4" fill="#059669"/>
  <circle cx="410" cy="185" r="4" fill="#059669"/>

  <text x="440" y="284" font-size="11" fill="#64748B" text-anchor="middle">3 texts &#8594; 3 points, one space</text>

  <rect x="56" y="330" width="356" height="64" rx="8" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="72" y="356" font-size="12" fill="#334155">Dimensionality = numbers per vector.</text>
  <text x="72" y="376" font-size="12" fill="#334155">Typical range: 768&#8211;3,072 per vector.</text>

  <!-- RIGHT PANEL -->
  <rect x="504" y="64" width="424" height="440" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="520" y="90" font-size="12" fill="#64748B">Measuring similarity</text>

  <!-- axes -->
  <line x1="560" y1="440" x2="898" y2="440" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="440" x2="560" y2="142" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="892" y="430" font-size="11" fill="#64748B" text-anchor="end">dim 1</text>
  <text x="520" y="150" font-size="11" fill="#64748B">dim 2</text>
  <circle cx="560" cy="440" r="3" fill="#334155"/>
  <text x="548" y="456" font-size="11" fill="#334155" text-anchor="end">0</text>

  <!-- Euclidean distance dashed line (behind rays) -->
  <line x1="815" y1="345" x2="615" y2="170" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <rect x="655" y="238" width="146" height="20" fill="#ffffff"/>
  <text x="728" y="253" font-size="12" fill="#64748B" text-anchor="middle">Euclidean distance</text>

  <!-- rays from origin -->
  <line x1="560" y1="440" x2="815" y2="345" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="815" cy="345" r="5" fill="#7C3AED"/>
  <text x="822" y="342" font-size="12" fill="#2E1065">cat</text>

  <line x1="560" y1="440" x2="768" y2="332" stroke="#059669" stroke-width="2"/>
  <circle cx="768" cy="332" r="5" fill="#059669"/>
  <text x="668" y="336" font-size="12" fill="#064E3B">kitten</text>

  <line x1="560" y1="440" x2="615" y2="170" stroke="#EA580C" stroke-width="2"/>
  <circle cx="615" cy="170" r="5" fill="#EA580C"/>
  <text x="622" y="167" font-size="12" fill="#7C2D12">car</text>

  <text x="520" y="470" font-size="12" fill="#334155">cat &#8596; kitten: cos &#952; &#8776; 0.99 (nearly aligned)</text>
  <text x="520" y="490" font-size="12" fill="#334155">cat &#8596; car: cos &#952; &#8776; 0.24 (different direction)</text>
</svg>
