<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid, 24px padding)
Canvas 1200x360. Title center (600,44).

Main row, center y=160, h=64 unless noted:
  Raw text (orange)     x=24  y=128 w=180 -> 24..204,   128..192 c=(114,160) '"The unbelievable' / 'strawberry farm"'
  Tokenizer (indigo)    x=268 y=128 w=180 -> 268..448,  128..192 c=(358,160) "Tokenizer" / "(BPE vocabulary)"
  Tokens container (dashed, taller for caption): x=512 y=110 w=424 -> 512..936, 110..210. Caption (528,132) "7 tokens (BPE boundaries)"
    mini token boxes (h=40, y=140..180, c_y=160), 4px gaps, yellow pipeline-stage color:
      The    528..572 (44) c=550
      unbel  576..636 (60) c=606
      iev    640..680 (40) c=660
      able   684..736 (52) c=710
      straw  740..800 (60) c=770
      berry  804..860 (56) c=832
      farm   864..920 (56) c=892
  Token IDs (green)     x=1000 y=128 w=160 -> 1000..1160, 128..192 c=(1080,160) "Token IDs" / "→ the model"

Arrows (straight, end 2px before target edge):
  Raw text -> Tokenizer        (204,160)->(266,160)
  Tokenizer -> Tokens container(448,160)->(510,160)
  Tokens container -> Token IDs(936,160)->(998,160)

Callout (red guardrail), below main row: x=24 y=250 w=1152 h=86 -> 24..1176, 250..336
  3-line text explaining letters are invisible to the model, referencing [straw]/[berry].
-->
  <rect width="1200" height="360" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="600" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">One sentence, split into tokens of very different sizes</text>

  <!-- arrows -->
  <line x1="204" y1="160" x2="266" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="448" y1="160" x2="510" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="936" y1="160" x2="998" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- raw text -->
  <rect x="24" y="128" width="180" height="64" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="114" y="157" font-size="13" fill="#7C2D12" text-anchor="middle">"The unbelievable<tspan x="114" dy="17">strawberry farm"</tspan></text>

  <!-- tokenizer -->
  <rect x="268" y="128" width="180" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="358" y="157" font-size="14" fill="#1E1B4B" text-anchor="middle">Tokenizer<tspan x="358" dy="17" font-size="12">(BPE vocabulary)</tspan></text>

  <!-- tokens container -->
  <rect x="512" y="110" width="424" height="100" rx="10" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="528" y="132" font-size="12" fill="#64748B">7 tokens (BPE boundaries)</text>

  <rect x="528" y="140" width="44" height="40" rx="6" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="550" y="164" font-size="10" fill="#713F12" text-anchor="middle">The</text>

  <rect x="576" y="140" width="60" height="40" rx="6" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="606" y="164" font-size="10" fill="#713F12" text-anchor="middle">unbel</text>

  <rect x="640" y="140" width="40" height="40" rx="6" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="660" y="164" font-size="10" fill="#713F12" text-anchor="middle">iev</text>

  <rect x="684" y="140" width="52" height="40" rx="6" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="710" y="164" font-size="10" fill="#713F12" text-anchor="middle">able</text>

  <rect x="740" y="140" width="60" height="40" rx="6" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="770" y="164" font-size="10" fill="#713F12" text-anchor="middle">straw</text>

  <rect x="804" y="140" width="56" height="40" rx="6" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="832" y="164" font-size="10" fill="#713F12" text-anchor="middle">berry</text>

  <rect x="864" y="140" width="56" height="40" rx="6" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="892" y="164" font-size="10" fill="#713F12" text-anchor="middle">farm</text>

  <!-- token ids -->
  <rect x="1000" y="128" width="160" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="1080" y="157" font-size="14" fill="#064E3B" text-anchor="middle">Token IDs<tspan x="1080" dy="17" font-size="12">&#8594; the model</tspan></text>

  <!-- callout -->
  <rect x="24" y="250" width="1152" height="86" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="600" y="276" font-size="12" fill="#7F1D1D" text-anchor="middle">No token boundary lines up with individual letters — the model never sees s-t-r-a-w-b-e-r-r-y, only</text>
  <text x="600" y="296" font-size="12" fill="#7F1D1D" text-anchor="middle">the chunks [straw] and [berry]. Counting letters means reasoning about spelling structure that was</text>
  <text x="600" y="316" font-size="12" fill="#7F1D1D" text-anchor="middle">never shown directly — which is why letter-level tasks are unreliable.</text>
</svg>
