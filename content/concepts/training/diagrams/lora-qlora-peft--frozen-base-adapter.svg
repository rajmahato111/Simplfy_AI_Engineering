<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="312" viewBox="0 0 1160 312" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid, 24px padding)
Canvas 1160x312. Title center (580,44).

Input (tall, spans both rows so arrows leave at native height, 0 bends):
  "Input x" x=24 y=96 w=160 h=192 -> 24..184, 96..288 (neutral note)

Row top (frozen path, y=96..160, center=128):
  "Frozen W"  x=248 y=96 w=224 h=64 -> 248..472 (neutral note - inert/locked)

Row bottom (trainable low-rank path, y=224..288, center=256):
  "A (down-project)" x=248 y=224 w=160 h=64 -> 248..408 (yellow pipeline)
  "B (up-project)"   x=472 y=224 w=160 h=64 -> 472..632 (yellow pipeline)

Merge node (tall, spans both rows so both paths land at native height, 0 bends):
  "+ combine" x=696 y=96 w=176 h=192 -> 696..872, 96..288 (indigo service)

Output:
  "Output h" x=936 y=160 w=200 h=64 -> 936..1136, 160..224 center=192 (purple LLM)

Arrows (straight horizontal/vertical, 0 bends):
  Input(184,128)  -> Frozen(248,128)
  Input(184,256)  -> A(248,256)
  Frozen(472,128) -> Merge(696,128)
  A(408,256)      -> B(472,256)
  B(632,256)      -> Merge(696,256)
  Merge(872,192)  -> Output(936,192)
-->
  <rect width="1160" height="312" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="580" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">One input, two paths: a frozen matrix and a low-rank detour</text>

  <!-- Input x -->
  <rect x="24" y="96" width="160" height="192" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="104" y="196" font-size="14" fill="#334155" text-anchor="middle">Input x</text>

  <!-- Frozen W -->
  <rect x="248" y="96" width="224" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="360" y="123" font-size="14" fill="#334155" text-anchor="middle">Frozen W<tspan x="360" dy="17" font-size="12">pretrained, locked</tspan></text>

  <!-- A -->
  <rect x="248" y="224" width="160" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="328" y="251" font-size="14" fill="#713F12" text-anchor="middle">A<tspan x="328" dy="17" font-size="12">down-project d&#8594;r</tspan></text>

  <!-- B -->
  <rect x="472" y="224" width="160" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="552" y="251" font-size="14" fill="#713F12" text-anchor="middle">B<tspan x="552" dy="17" font-size="12">up-project r&#8594;d</tspan></text>

  <!-- Merge -->
  <rect x="696" y="96" width="176" height="192" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="784" y="185" font-size="14" fill="#1E1B4B" text-anchor="middle">+ combine<tspan x="784" dy="17" font-size="12">scaled by &#945;/r</tspan></text>

  <!-- Output -->
  <rect x="936" y="160" width="200" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1036" y="187" font-size="14" fill="#2E1065" text-anchor="middle">Output h<tspan x="1036" dy="17" font-size="12">= Wx + (BA)x&#183;&#945;/r</tspan></text>

  <!-- Arrows -->
  <line x1="184" y1="128" x2="248" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="184" y1="256" x2="248" y2="256" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="472" y1="128" x2="696" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="408" y1="256" x2="472" y2="256" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="632" y1="256" x2="696" y2="256" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="872" y1="192" x2="936" y2="192" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
