<svg xmlns="http://www.w3.org/2000/svg" width="1088" height="408" viewBox="0 0 1088 408" font-family="system-ui, -apple-system, 'Segoe UI', 'DejaVu Sans', sans-serif">
<!--
COORDINATE PLAN (8px grid, 24px padding)
Canvas 1088x408. Title center (544,44).

Main row (y=96..160, center=128):
  "Teacher model"       x=24  y=96 w=200 h=64 -> 24..224   (purple LLM)
  "Temp-scaled logits"  x=288 y=96 w=216 h=64 -> 288..504  (yellow pipeline)
  "Distillation loss"   x=568 y=96 w=216 h=64 -> 568..784  (indigo service)
  "Student model"       x=848 y=96 w=216 h=64 -> 848..1064 (purple LLM)

Secondary row (y=224..288, center=256):
  "Ground-truth hard label" x=568 y=224 w=216 h=64 -> 568..784 (green data store)
  [same x-range as Distillation loss above -> vertical feed, 0 bends]

Arrows (straight, 0 bends):
  Teacher(224,128)  -> Logits(288,128)
  Logits(504,128)   -> Loss(568,128)
  Loss(784,128)     -> Student(848,128)
  HardLabel(676,224)-> Loss(676,160)     [vertical, same x-center 676]

Note (neutral, standalone, no arrow):
  x=264 y=320 w=560 h=64 -> 264..824, 320..384
  "Higher temperature flattens the distribution," / "revealing near-miss tokens the hard label hides."
-->
  <rect width="1088" height="408" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5"
    orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker></defs>

  <text x="544" y="44" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">Knowledge distillation: soft labels plus hard labels</text>

  <!-- Teacher model -->
  <rect x="24" y="96" width="200" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="124" y="123" font-size="14" fill="#2E1065" text-anchor="middle">Teacher model<tspan x="124" dy="17" font-size="12">large, frozen</tspan></text>

  <!-- Temp-scaled logits -->
  <rect x="288" y="96" width="216" height="64" rx="10" fill="#FEFCE8" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="396" y="123" font-size="14" fill="#713F12" text-anchor="middle">Temp-scaled logits<tspan x="396" dy="17" font-size="12">soft labels</tspan></text>

  <!-- Distillation loss -->
  <rect x="568" y="96" width="216" height="64" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="676" y="123" font-size="14" fill="#1E1B4B" text-anchor="middle">Distillation loss<tspan x="676" dy="17" font-size="12">KL + CE blend</tspan></text>

  <!-- Student model -->
  <rect x="848" y="96" width="216" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="956" y="123" font-size="14" fill="#2E1065" text-anchor="middle">Student model<tspan x="956" dy="17" font-size="12">small, updates</tspan></text>

  <!-- Ground-truth hard label -->
  <rect x="568" y="224" width="216" height="64" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="676" y="251" font-size="14" fill="#064E3B" text-anchor="middle">Ground-truth<tspan x="676" dy="17" font-size="12">hard label</tspan></text>

  <!-- Arrows -->
  <line x1="224" y1="128" x2="288" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="504" y1="128" x2="568" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="784" y1="128" x2="848" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="676" y1="224" x2="676" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Note -->
  <rect x="264" y="320" width="560" height="64" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="544" y="345" font-size="12" fill="#334155" text-anchor="middle">Higher temperature flattens the distribution,<tspan x="544" dy="16">revealing near-miss tokens the hard label hides.</tspan></text>
</svg>
