name: CI

on:
  push:
    branches: ["cursor/**", "claude/**", "main"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: simplify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUTH_SECRET: ci-build-secret
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simplify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run db:push
      - run: npm run db:reindex
      - run: npm run ingest:validate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run validate:content
      - run: npm run validate:frontmatter
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
